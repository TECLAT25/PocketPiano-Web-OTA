<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#6750a4">
  <title>PocketPiano OTA · Android Web App</title>
  <style>
    :root{font-family:Roboto,system-ui,-apple-system,"Segoe UI",sans-serif;color:#1d1b20;background:#f7f2fa}
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f7f2fa}
    .appbar{height:calc(72px + env(safe-area-inset-top));padding:calc(12px + env(safe-area-inset-top)) 18px 10px;background:#fffbfe;border-bottom:1px solid rgba(121,116,126,.18);display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2;box-shadow:0 2px 8px rgba(29,27,32,.06)}
    .title{font-size:1.25rem;font-weight:700}.subtitle{font-size:.78rem;color:#625b71;margin-top:2px}.logo{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:#eaddff;color:#21005d;font-weight:800}
    iframe{display:block;width:100%;height:calc(100% - 72px - env(safe-area-inset-top));border:0;background:#f7f2fa}
    .loading{position:fixed;inset:72px 0 0;display:grid;place-items:center;background:#f7f2fa;color:#6750a4;font-weight:700;z-index:1}
  </style>
</head>
<body>
  <header class="appbar">
    <div><div class="title">PocketPiano OTA</div><div class="subtitle">Aplicación web para Android</div></div>
    <div class="logo">PP</div>
  </header>
  <div id="loading" class="loading">Cargando aplicación…</div>
  <iframe id="app" src="./index.html" title="PocketPiano OTA"></iframe>
  <script>
    const frame=document.getElementById('app');
    frame.addEventListener('load',()=>{
      const doc=frame.contentDocument;
      if(!doc)return;
      document.getElementById('loading').remove();
      const style=doc.createElement('style');
      style.textContent=`
        :root{font-family:Roboto,system-ui,-apple-system,"Segoe UI",sans-serif!important;color:#1d1b20!important;background:#f7f2fa!important;--primary:#6750a4;--container:#eaddff}
        html,body{background:linear-gradient(180deg,#f7f2fa,#fffbfe)!important}
        body{padding-bottom:calc(88px + env(safe-area-inset-bottom))!important}
        .shell{width:min(680px,100%)!important;padding:16px 16px 40px!important}
        .hero{padding:14px 4px 8px!important}.hero .brand{display:inline-flex!important;background:#eaddff!important;color:#21005d!important;padding:7px 12px!important;border-radius:999px!important;letter-spacing:0!important;text-transform:none!important}
        h1{font-size:clamp(2rem,9vw,3rem)!important;letter-spacing:-.04em!important}.hero p{color:#625b71!important}
        .card{border-radius:28px!important;padding:20px!important;background:#fffbfe!important;border:1px solid rgba(121,116,126,.14)!important;box-shadow:0 2px 8px rgba(29,27,32,.06)!important}
        .status-card{background:#eaddff!important;color:#21005d!important}.badge{background:rgba(33,0,93,.08)!important}.badge.connected{background:#c8f7d4!important;color:#0f5223!important}
        h2{font-size:1.18rem!important}.eyebrow,dt,.hint{color:#625b71!important}
        button{min-height:52px!important;border-radius:999px!important;font-weight:700!important;-webkit-tap-highlight-color:transparent!important}
        .primary{background:#6750a4!important;color:#fff!important;box-shadow:0 4px 12px rgba(103,80,164,.24)!important}.secondary{background:#e7e0ec!important;color:#1d1b20!important}.danger{background:#b3261e!important}
        .file-picker{border-radius:20px!important;border-color:#79747e!important;background:#fff!important;padding:22px!important}
        select{border-radius:14px!important;padding:14px!important}.warning{background:#ffede6!important;color:#7a2e0e!important;border-radius:18px!important}.log{border-radius:18px!important;background:#1d1b20!important}
        progress{accent-color:#6750a4!important}
        @media(max-width:480px){.details div{grid-template-columns:92px 1fr!important}.card{padding:18px!important}}
      `;
      doc.head.appendChild(style);
      const nav=doc.createElement('nav');
      nav.innerHTML='<a href="#" data-target="connectBtn"><b>◉</b><span>Conectar</span></a><a href="#" data-target="firmwareInput"><b>⇧</b><span>Firmware</span></a><a href="#" data-target="log"><b>⚙</b><span>Técnico</span></a>';
      nav.style.cssText='position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(680px,100%);display:grid;grid-template-columns:repeat(3,1fr);padding:8px 18px calc(8px + env(safe-area-inset-bottom));background:rgba(255,251,254,.97);backdrop-filter:blur(18px);border-top:1px solid rgba(121,116,126,.18);z-index:9999';
      nav.querySelectorAll('a').forEach(a=>{a.style.cssText='min-height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#625b71;text-decoration:none;font-size:.72rem;font-weight:700;border-radius:18px';a.addEventListener('click',e=>{e.preventDefault();const target=doc.getElementById(a.dataset.target);if(target){if(a.dataset.target==='log')target.closest('details').open=true;target.scrollIntoView({behavior:"smooth",block:"center"})}})});
      doc.body.appendChild(nav);
    });
  </script>
</body>
</html>
